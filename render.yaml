services:
  - type: web
    name: order-mvp-api
    runtime: python
    buildCommand: apt-get install -y tesseract-ocr && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Order MVP API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./orders.db
      - key: API_KEY
        generateValue: true
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_PERIOD
        value: minute

